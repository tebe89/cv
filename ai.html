<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini CV Architect - Fixed Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .preview-container { 
            background: white; width: 210mm; height: 297mm; padding: 25mm 20mm; 
            margin: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .preview-container { box-shadow: none; margin: 0; width: 100%; border: none; }
            @page { size: A4; margin: 0; }
        }
        .model-item { 
            cursor: pointer; padding: 8px 12px; font-size: 11px; margin-bottom: 4px; 
            border-radius: 8px; border: 1px solid #e2e8f0; transition: all 0.2s; background: white;
        }
        .model-item:hover { background: #f8fafc; border-color: #3b82f6; }
        .model-active { background: #dbeafe !important; border-color: #2563eb !important; color: #1e40af !important; font-weight: bold; }
        #ai-body { text-align: justify; line-height: 1.7; transition: font-size 0.2s; }
        #ttd-img { display: none; max-height: 80px; mix-blend-mode: multiply; filter: contrast(1.2); }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="max-w-[1500px] mx-auto flex flex-col lg:flex-row gap-8 justify-center">
        
        <div class="lg:w-[420px] space-y-4 no-print h-fit sticky top-4">
            
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">1. Konfigurasi AI</h3>
                <div class="flex gap-2 mb-4">
                    <input type="password" id="apiKey" placeholder="Input API Key..." class="flex-grow p-2.5 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="auditModels()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-black transition">AUDIT</button>
                </div>
                
                <div id="modelSection" class="hidden">
                    <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase italic">Pilih Model (Klik Salah Satu):</label>
                    <div id="modelList" class="bg-slate-50 border rounded-xl max-h-44 overflow-y-auto p-2">
                        </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 space-y-3">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">2. Detail Surat</h3>
                <input type="text" id="inNama" placeholder="Nama Anda" class="w-full p-2.5 border rounded-xl text-sm" value="Tamroni" oninput="sync()">
                <input type="text" id="inPT" placeholder="Nama Perusahaan" class="w-full p-2.5 border rounded-xl text-sm" oninput="sync()">
                <input type="text" id="inPosisi" placeholder="Posisi yang Dilamar" class="w-full p-2.5 border rounded-xl text-sm">
                <textarea id="inPrompt" placeholder="Tulis pengalaman singkat Anda di sini..." class="w-full p-3 border rounded-xl h-24 text-sm outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                
                <button id="btnGenerate" onclick="generateLetter()" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition flex justify-center items-center gap-2">
                    <span id="txtGen">BUAT SURAT DENGAN AI</span>
                </button>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 space-y-3">
                <input type="file" id="inTTD" accept="image/*" class="text-xs w-full" onchange="handleSignature(event)">
                <button onclick="window.print()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-black transition">SIMPAN PDF</button>
            </div>
        </div>

        <div class="preview-container" id="printable">
            <div class="flex justify-between items-end border-b-2 border-slate-900 pb-6 mb-8">
                <div>
                    <h1 id="outNama" class="text-4xl font-bold text-slate-900 uppercase" style="font-family: 'Playfair Display', serif;">TAMRONI</h1>
                    <p id="outRole" class="text-[10px] tracking-[0.4em] text-blue-600 mt-2 uppercase font-bold italic">Professional Application</p>
                </div>
                <div class="text-right text-[9pt] text-slate-400 italic">
                    Tangerang, Indonesia<br>
                    <span id="outTanggal"></span>
                </div>
            </div>

            <div class="flex-grow">
                <div class="mb-8 text-slate-800">
                    <p class="mb-6" id="outFullDate"></p>
                    <p class="text-[11pt]">Kepada Yth. Pimpinan HRD</p>
                    <p id="outPT" class="font-bold text-[12pt] text-slate-900 uppercase">Nama Perusahaan Tujuan</p>
                    <p class="text-[11pt]">Di Tempat</p>
                </div>

                <div id="ai-body" class="text-slate-800 text-[11pt]">
                    <p class="font-bold underline italic mb-4">Perihal: Lamaran Pekerjaan</p>
                    <p class="mb-4">Dengan hormat,</p>
                    <div id="letterContent" class="whitespace-pre-line min-h-[150px]">
                        Isi surat akan muncul di sini...
                    </div>
                </div>
            </div>

            <div class="flex justify-end">
                <div class="w-48 text-center">
                    <p class="text-[9pt] mb-2 italic">Hormat saya,</p>
                    <div class="h-20 flex items-center justify-center">
                        <img id="ttd-img" src="">
                    </div>
                    <p id="outNamaTtd" class="font-bold border-t border-slate-800 pt-1 mt-1 text-[10pt] uppercase">TAMRONI</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedModel = "models/gemini-1.5-flash";

        // Fungsi Audit & Tampilkan Model
        async function auditModels() {
            const key = document.getElementById('apiKey').value.trim();
            const list = document.getElementById('modelList');
            if(!key) return alert("Isi API Key!");

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${key}`);
                const data = await res.json();
                
                if(data.models) {
                    list.innerHTML = "";
                    document.getElementById('modelSection').classList.remove('hidden');
                    
                    data.models.forEach(m => {
                        if(m.supportedGenerationMethods.includes("generateContent")) {
                            const btn = document.createElement('div');
                            btn.className = `model-item ${m.name === selectedModel ? 'model-active' : ''}`;
                            btn.innerText = m.name.replace('models/', '').toUpperCase();
                            // Pasang event click langsung
                            btn.onclick = function() {
                                document.querySelectorAll('.model-item').forEach(el => el.classList.remove('model-active'));
                                this.classList.add('model-active');
                                selectedModel = m.name;
                            };
                            list.appendChild(btn);
                        }
                    });
                } else { throw new Error("Key Salah!"); }
            } catch (e) { alert("Gagal: " + e.message); }
        }

        async function generateLetter() {
            const key = document.getElementById('apiKey').value.trim();
            if(!key) return alert("Klik Audit dulu!");

            const btn = document.getElementById('btnGenerate');
            btn.disabled = true;
            document.getElementById('txtGen').innerText = "AI SEDANG MENULIS...";

            const prompt = `Tulis isi surat lamaran kerja Bahasa Indonesia formal. Nama: ${document.getElementById('inNama').value}, PT: ${document.getElementById('inPT').value}, Posisi: ${document.getElementById('inPosisi').value}, Info: ${document.getElementById('inPrompt').value}. Langsung isi saja.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/${selectedModel}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                document.getElementById('letterContent').innerText = data.candidates[0].content.parts[0].text;
                autoScale();
            } catch (e) { alert("Error AI!"); }
            finally { 
                btn.disabled = false; 
                document.getElementById('txtGen').innerText = "BUAT SURAT DENGAN AI";
            }
        }

        function sync() {
            const n = document.getElementById('inNama').value || "TAMRONI";
            document.getElementById('outNama').innerText = n;
            document.getElementById('outNamaTtd').innerText = n;
            document.getElementById('outPT').innerText = document.getElementById('inPT').value || "Nama Perusahaan Tujuan";
            const d = new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('outTanggal').innerText = d;
            document.getElementById('outFullDate').innerText = "Tangerang, " + d;
        }

        function handleSignature(e) {
            const img = document.getElementById('ttd-img');
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (f) => { img.src = f.target.result; img.style.display = "block"; };
                reader.readAsDataURL(e.target.files[0]);
            }
        }

        function autoScale() {
            const container = document.getElementById('printable');
            const body = document.getElementById('ai-body');
            let size = 11;
            body.style.fontSize = size + "pt";
            while (container.scrollHeight > container.offsetHeight && size > 8) {
                size -= 0.1;
                body.style.fontSize = size + "pt";
            }
        }
        sync();
    </script>
</body>
</html>
